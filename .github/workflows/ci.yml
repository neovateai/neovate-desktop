name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-title:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            build
            style

  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Check formatting, lint, and types
        run: bun run check
      - name: Run unit tests
        run: bun run test:run

  build-mac-dev:
    needs: check
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: arm64
          - os: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build dev package
        working-directory: packages/desktop
        run: bun run build && BUILD_ENV=dev bunx electron-builder --mac --${{ matrix.arch }} --config configs/electron-builder.mjs --publish=never
      - name: Calculate artifact sizes
        id: sizes
        working-directory: packages/desktop
        run: |
          ZIP_FILE=$(find release -name "*-${{ matrix.arch }}.zip" -type f | head -n 1)
          if [ -f "$ZIP_FILE" ]; then
            ZIP_SIZE_BYTES=$(stat -f%z "$ZIP_FILE" 2>/dev/null || stat -c%s "$ZIP_FILE" 2>/dev/null)
            ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE_BYTES / 1048576" | bc)
          fi
          mkdir -p size-info
          echo "ZIP: ${ZIP_SIZE_MB:-N/A} MB" > size-info/${{ matrix.arch }}-sizes.txt
          cat size-info/${{ matrix.arch }}-sizes.txt
      - name: Upload size info
        uses: actions/upload-artifact@v4
        with:
          name: size-info-${{ matrix.arch }}
          path: packages/desktop/size-info/${{ matrix.arch }}-sizes.txt
          if-no-files-found: error
          retention-days: 7
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neovate-dev-${{ matrix.arch }}
          path: packages/desktop/release/*-${{ matrix.arch }}.zip
          if-no-files-found: error
          retention-days: 7

  build-win-dev:
    needs: check
    if: github.event_name == 'pull_request'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build app
        working-directory: packages/desktop
        run: bun run build
      - name: Package Windows installer
        working-directory: packages/desktop
        run: bunx electron-builder --win --x64 --config configs/electron-builder.mjs --publish=never
        env:
          BUILD_ENV: dev
      - name: Calculate artifact sizes
        id: sizes
        working-directory: packages/desktop
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path release -Filter "*.exe" -Recurse | Select-Object -First 1
          $sizeMB = if ($exe) { [math]::Round($exe.Length / 1MB, 2) } else { "N/A" }
          New-Item -ItemType Directory -Force -Path size-info | Out-Null
          "EXE: $sizeMB MB" | Out-File -FilePath size-info/win-x64-sizes.txt
          Get-Content size-info/win-x64-sizes.txt
      - name: Upload size info
        uses: actions/upload-artifact@v4
        with:
          name: size-info-win-x64
          path: packages/desktop/size-info/win-x64-sizes.txt
          if-no-files-found: error
          retention-days: 7
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neovate-dev-win-x64
          path: packages/desktop/release/*.exe
          if-no-files-found: error
          retention-days: 7

  comment:
    needs: [build-mac-dev, build-win-dev]
    runs-on: ubuntu-latest
    if: always() && needs.build-mac-dev.result == 'success' && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Download size info artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: size-info-*
          path: size-info
      - name: Post PR comment with artifact links
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const identifier = '<!-- neovate-build -->';

            const readSize = (arch) => {
              try {
                const sizeFile = path.join('size-info', `size-info-${arch}`, `${arch}-sizes.txt`);
                const content = fs.readFileSync(sizeFile, 'utf8');
                const sizeLine = content.trim().split('\n').find(l => /^(ZIP|EXE):/.test(l));
                return sizeLine ? sizeLine.split(':')[1].trim() : 'N/A';
              } catch (error) {
                console.error(`Error reading size info for ${arch}:`, error);
                return 'N/A';
              }
            };

            const arm64Size = readSize('arm64');
            const x64Size = readSize('x64');
            const winX64Size = readSize('win-x64');

            const { data: { artifacts } } = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });

            const arm64 = artifacts.find(a => a.name === 'neovate-dev-arm64');
            const x64 = artifacts.find(a => a.name === 'neovate-dev-x64');
            const winX64 = artifacts.find(a => a.name === 'neovate-dev-win-x64');

            const artifactUrl = (artifact) =>
              `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}/artifacts/${artifact.id}`;

            const body = [
              identifier,
              '## Build Ready',
              '',
              '| Platform | Architecture | Download | Size |',
              '|----------|--------------|----------|------|',
              `| macOS | Apple Silicon | ${arm64 ? `[Download](${artifactUrl(arm64)})` : 'N/A'} | ${arm64Size} |`,
              `| macOS | Intel | ${x64 ? `[Download](${artifactUrl(x64)})` : 'N/A'} | ${x64Size} |`,
              `| Windows | x64 | ${winX64 ? `[Download](${artifactUrl(winX64)})` : 'N/A'} | ${winX64Size} |`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(identifier));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup bun
        uses: oven-sh/setup-bun@v2
      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-
      - name: Install Electron system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-0t64 libnss3 libasound2t64 libgbm1 libatk-bridge2.0-0t64 libdrm2 libxcomposite1 libxdamage1 libxrandr2 libcups2t64 libxss1 libxtst6
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: ${{ runner.os }}-electron-${{ hashFiles('packages/desktop/package.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run e2e tests
        run: xvfb-run bun run test:e2e
        env:
          ELECTRON_DISABLE_SANDBOX: "1"
